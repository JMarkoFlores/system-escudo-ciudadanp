# ============================================================
# IntelExtorsión - Docker Compose Consolidado
# Orquesta todos los subsistemas:
#   - PostgreSQL + Qdrant (Infraestructura compartida)
#   - Agent System API (FastAPI + LangGraph)
#   - Web3 Backend API (FastAPI + Web3.py)
#   - Next.js Frontend
# ============================================================

services:
  # ----------------------------------------------------------
  # INFRAESTRUCTURA COMPARTIDA
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: intel_extorsion_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agent_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_pass}
      POSTGRES_DB: ${POSTGRES_DB:-intel_extorsion}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent_user} -d ${POSTGRES_DB:-intel_extorsion}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - intel_extorsion_network

  qdrant:
    image: qdrant/qdrant:v1.9.1
    container_name: intel_extorsion_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - intel_extorsion_network

  redis:
    image: redis:7-alpine
    container_name: intel_extorsion_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - intel_extorsion_network

  # ----------------------------------------------------------
  # SUBSISTEMA DE AGENTES AUTÓNOMOS
  # ----------------------------------------------------------
  agent-api:
    build:
      context: ./intel_extorsion_agent_system
      dockerfile: deployments/Dockerfile
    container_name: intel_extorsion_agent_api
    restart: unless-stopped
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GROQ_TEMPERATURE: "0.2"
      GROQ_MAX_TOKENS: "4096"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-intel_extorsion}
      POSTGRES_USER: ${POSTGRES_USER:-agent_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_pass}
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      REDIS_URL: "redis://redis:6379/0"
      DEBUG: "false"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - intel_extorsion_network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)\""]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./intel_extorsion_agent_system/app:/app/app:ro
      - evidencias_data:/app/uploads/evidencias

  # ----------------------------------------------------------
  # SUBSISTEMA WEB3
  # ----------------------------------------------------------
  web3-backend:
    build:
      context: ./intel_extorsion_web3_system/backend
      dockerfile: Dockerfile
    container_name: intel_extorsion_web3_backend
    restart: unless-stopped
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "8001"
      WEB3_PROVIDER_URL: ${WEB3_PROVIDER_URL:-https://rpc-zk.tanenbaum.io}
      CHAIN_ID: ${CHAIN_ID:-57057}
      EXPLORER_URL: ${EXPLORER_URL:-https://explorer-zk.tanenbaum.io}
      NETWORK_NAME: ${NETWORK_NAME:-zkSYS Tanenbaum Testnet}
      PRIVATE_KEY: ${PRIVATE_KEY}
      CONTRACT_EVIDENCE_REGISTRY: ${CONTRACT_EVIDENCE_REGISTRY:-0x1A9eB1a4C261AE793e21101a3E5c14003dcF4dEb}
      CONTRACT_CASE_MANAGER: ${CONTRACT_CASE_MANAGER:-0x3576cb05B2c4094e8f97639892D235044d7476a1}
      CONTRACT_DID_REGISTRY: ${CONTRACT_DID_REGISTRY:-0x8481c85e54f50C676f0fc37f90848030c3B12bB9}
      CONTRACT_TOKEN: ${CONTRACT_TOKEN:-0x622AA147eD0238840ceb215941D5E8CD997896F0}
      IPFS_JWT: ${IPFS_JWT}
      X509_CERT_PEM: ${X509_CERT_PEM}
      AGENT_SYSTEM_API_URL: http://agent-api:8000
    ports:
      - "8001:8001"
    depends_on:
      - agent-api
    networks:
      - intel_extorsion_network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=5)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # FRONTENDS NEXT.JS
  # ----------------------------------------------------------
  frontend-citizen:
    build:
      context: ./intel_extorsion_frontend_citizen
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_AGENT_API_URL: http://localhost:8000
        NEXT_PUBLIC_WEB3_API_URL: http://localhost:8001
        NEXT_PUBLIC_RPC_URL: ${WEB3_PROVIDER_URL:-https://rpc-zk.tanenbaum.io}
        NEXT_PUBLIC_CHAIN_ID: ${CHAIN_ID:-57057}
        NEXT_PUBLIC_EXPLORER_URL: ${EXPLORER_URL:-https://explorer-zk.tanenbaum.io}
        NEXT_PUBLIC_CONTRACT_EVIDENCE_REGISTRY: ${CONTRACT_EVIDENCE_REGISTRY:-0x1A9eB1a4C261AE793e21101a3E5c14003dcF4dEb}
        NEXT_PUBLIC_CONTRACT_CASE_MANAGER: ${CONTRACT_CASE_MANAGER:-0x3576cb05B2c4094e8f97639892D235044d7476a1}
        NEXT_PUBLIC_CONTRACT_DID_REGISTRY: ${CONTRACT_DID_REGISTRY:-0x8481c85e54f50C676f0fc37f90848030c3B12bB9}
        NEXT_PUBLIC_CONTRACT_TOKEN: ${CONTRACT_TOKEN:-0x622AA147eD0238840ceb215941D5E8CD997896F0}
    container_name: intel_extorsion_frontend_citizen
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - agent-api
      - web3-backend
    networks:
      - intel_extorsion_network

  frontend-police:
    build:
      context: ./intel_extorsion_frontend_police
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_AGENT_API_URL: http://localhost:8000
        NEXT_PUBLIC_WEB3_API_URL: http://localhost:8001
        NEXT_PUBLIC_RPC_URL: ${WEB3_PROVIDER_URL:-https://rpc-zk.tanenbaum.io}
        NEXT_PUBLIC_CHAIN_ID: ${CHAIN_ID:-57057}
        NEXT_PUBLIC_EXPLORER_URL: ${EXPLORER_URL:-https://explorer-zk.tanenbaum.io}
        NEXT_PUBLIC_CONTRACT_EVIDENCE_REGISTRY: ${CONTRACT_EVIDENCE_REGISTRY:-0x1A9eB1a4C261AE793e21101a3E5c14003dcF4dEb}
        NEXT_PUBLIC_CONTRACT_CASE_MANAGER: ${CONTRACT_CASE_MANAGER:-0x3576cb05B2c4094e8f97639892D235044d7476a1}
        NEXT_PUBLIC_CONTRACT_DID_REGISTRY: ${CONTRACT_DID_REGISTRY:-0x8481c85e54f50C676f0fc37f90848030c3B12bB9}
        NEXT_PUBLIC_CONTRACT_TOKEN: ${CONTRACT_TOKEN:-0x622AA147eD0238840ceb215941D5E8CD997896F0}
    container_name: intel_extorsion_frontend_police
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      - agent-api
      - web3-backend
    networks:
      - intel_extorsion_network

  dapp:
    build:
      context: ./intel_extorsion_web3_system/dapp
      dockerfile: Dockerfile
      args:
        VITE_RPC_URL: ${WEB3_PROVIDER_URL:-https://rpc-zk.tanenbaum.io}
        VITE_CHAIN_ID: ${CHAIN_ID:-57057}
        VITE_CONTRACT_EVIDENCE_REGISTRY: ${CONTRACT_EVIDENCE_REGISTRY:-0x1A9eB1a4C261AE793e21101a3E5c14003dcF4dEb}
        VITE_CONTRACT_CASE_MANAGER: ${CONTRACT_CASE_MANAGER:-0x3576cb05B2c4094e8f97639892D235044d7476a1}
        VITE_CONTRACT_DID_REGISTRY: ${CONTRACT_DID_REGISTRY:-0x8481c85e54f50C676f0fc37f90848030c3B12bB9}
        VITE_CONTRACT_TOKEN: ${CONTRACT_TOKEN:-0x622AA147eD0238840ceb215941D5E8CD997896F0}
        VITE_CONTRACT_EVIDENCE_SEAL: ${CONTRACT_EVIDENCE_SEAL:-0x0000000000000000000000000000000000000000}
        VITE_API_URL: http://localhost:8001
    container_name: intel_extorsion_dapp
    restart: unless-stopped
    ports:
      - "3002:80"
    depends_on:
      - web3-backend
    networks:
      - intel_extorsion_network

volumes:
  postgres_data:
  qdrant_data:
  evidencias_data:

networks:
  intel_extorsion_network:
    driver: bridge
