services:
  agent-api:
    environment:
      MOCK_LLM: "true"

  web3-backend:
    environment:
      MOCK_LLM: "true"

  test-runner:
    build:
      context: ./tests
      dockerfile: Dockerfile
    environment:
      AGENT_API_URL: http://agent-api:8000
      WEB3_API_URL: http://web3-backend:8001
      GROQ_API_KEY: ${GROQ_API_KEY}
      MOCK_LLM: "true"
    depends_on:
      agent-api:
        condition: service_healthy
      web3-backend:
        condition: service_healthy
    networks:
      - intel_extorsion_network
